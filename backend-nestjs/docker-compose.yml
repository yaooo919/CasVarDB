services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: casvardb
      MYSQL_USER: collab_casvardb
      MYSQL_PASSWORD: Cv2y*%
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -prootpass --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  localstack:
    image: localstack/localstack:3.5
    restart: unless-stopped
    ports:
      - "4566"
    environment:
      SERVICES: sqs
      DEBUG: "0"
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:4566/_localstack/health | grep -q '\"sqs\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data: {}
  localstack_data: {}
