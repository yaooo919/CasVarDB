services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: casvardb
      MYSQL_USER: collab_casvardb
      MYSQL_PASSWORD: Cv2y*%
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -prootpass --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data: {}
